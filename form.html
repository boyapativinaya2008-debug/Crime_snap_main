<!DOCTYPE html>
<html>
<body>

<h2>Form</h2>

<input type="text" id="name" placeholder="Student Name"><br><br>
<input type="number" id="age" placeholder="Age"><br><br>
<input type="number" id="marks" placeholder="Marks" min="0" max="600"><br><br>
<input type="text" id="grade" placeholder="Grade"pattern="[ABCDF]" 
       title="Only A, B, C, D, F allowed" required><br><br>


<button onclick="addStudent()">Add Student</button>

<hr>

<h2>Students</h2>
<div id="students"></div>

<script>

function addStudent() {

  const student = {
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    marks: document.getElementById("marks").value,
    grade: document.getElementById("grade").value
  };

  
  fetch("http://localhost:5001/addStudent", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(student)
  })
  .then(res => res.text())
  .then(data => {
    alert(data);

   
    displayStudent(student);

  
    document.getElementById("name").value = "";
    document.getElementById("age").value = "";
    document.getElementById("marks").value = "";
    document.getElementById("grade").value = "";
  });
}



function displayStudent(student) {

  const container = document.getElementById("students");

  const div = document.createElement("div");

  div.innerHTML = `
    <h3>${student.name}</h3>
    <p>Age: ${student.age}</p>
    <p>Marks: ${student.marks}</p>
    <p>Grade: ${student.grade}</p>
  `;

  container.appendChild(div);
}

</script>

</body>
</html>
